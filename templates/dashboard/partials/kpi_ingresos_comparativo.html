{% load currency %}

<div id="kpi-comparativo-container">
    <div class="card border-0 shadow-sm p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="fw-bold text-dark mb-0">Comparación entre años</h6>
            {% if hay_comparativo %}
            <div class="dropdown">
                <button class="btn btn-sm btn-light border dropdown-toggle"
                        type="button"
                        data-bs-toggle="dropdown"
                        data-bs-auto-close="outside">
                    Años
                </button>
                <ul class="dropdown-menu dropdown-menu-end p-2" style="min-width: 160px;">
                    {% for anio in años_con_datos %}
                    <li>
                        <label class="dropdown-item d-flex align-items-center gap-2" style="cursor:pointer;">
                            <input type="checkbox"
                                   class="anio-check"
                                   value="{{ anio }}"
                                   {% if forloop.revcounter <= 2 %}checked{% endif %}>
                            {{ anio }}
                        </label>
                    </li>
                    {% endfor %}
                </ul>
            </div>
            {% endif %}
        </div>

        {% if hay_comparativo %}
        <div style="height: 260px; position: relative; width: 100%;">
            <canvas id="grafico-comparativo"
                    style="display: block;"
                    data-comparativo='{{ comparativo_json }}'>
            </canvas>
        </div>
        {% else %}
        <div class="text-center py-5 text-muted">
            <i class="bi bi-bar-chart" style="font-size: 2rem;"></i>
            <h5 class="mt-3">Sin comparación disponible</h5>
            <p>Necesitas al menos dos años con ingresos para comparar.</p>
        </div>
        {% endif %}
    </div>
</div>
